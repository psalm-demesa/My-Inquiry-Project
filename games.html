<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f0f0f;
    color: white;
}

h1 {
    margin-top: 20px;
    letter-spacing: 2px;
}

button {
    padding: 10px 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #222;
    color: white;
}

button:hover {
    background: #333;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(168, 152, 152, 0.85);
}

.popup-content {
    background: #1b1b1b;
    margin: 5% auto;
    padding: 20px;
    width: 80%;
    max-width: 500px;
    border-radius: 12px;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
    color: #aaa;
}

.close:hover {
    color: white;
}

canvas {
    background: black;
    display: block;
    margin: auto;
}
</style>
</head>

<body>

<button onclick="openPopup('snake')">Snake</button>
<button onclick="openPopup('wordle')">Wordle</button>
<button onclick="openPopup('rps')">Rock Paper Scissors</button>

<!-- SNAKE -->
<div id="snake" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup('snake')">X</span>
    <h2>Snake</h2>
    <canvas id="game" width="300" height="300"></canvas>
  </div>
</div>

<!-- WORDLE -->
<div id="wordle" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup('wordle')">X</span>
    <h2>Wordle</h2>

    <p>Guess: <b>CODE</b></p>
    <input id="guess" maxlength="4">
    <button onclick="checkWord()">Check</button>
    <p id="wordleResult"></p>
  </div>
</div>

<!-- RPS -->
<div id="rps" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup('rps')">X</span>
    <h2>Rock Paper Scissors</h2>

    <button onclick="play('rock')">Rock</button>
    <button onclick="play('paper')">Paper</button>
    <button onclick="play('scissors')">Scissors</button>

    <p id="rpsResult"></p>
  </div>
</div>

<script>
/* ---------------- POPUPS ---------------- */
function openPopup(id){
    document.getElementById(id).style.display = "block";
}

function closePopup(id){
    document.getElementById(id).style.display = "none";
}

/* ---------------- SNAKE ---------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 15;

let snake = [{x: 5*box, y: 5*box}];
let dir = "RIGHT";
let food = spawnFood();

document.addEventListener("keydown", e => {
    if(e.key === "ArrowLeft") dir = "LEFT";
    if(e.key === "ArrowRight") dir = "RIGHT";
    if(e.key === "ArrowUp") dir = "UP";
    if(e.key === "ArrowDown") dir = "DOWN";
});

function spawnFood(){
    return {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };
}

function drawSnake(){
    ctx.fillStyle = "lime";
    snake.forEach(s => ctx.fillRect(s.x, s.y, box, box));
}

function drawGame(){
    ctx.clearRect(0,0,300,300);

    let head = {...snake[0]};

    if(dir==="LEFT") head.x -= box;
    if(dir==="RIGHT") head.x += box;
    if(dir==="UP") head.y -= box;
    if(dir==="DOWN") head.y += box;

    if(head.x === food.x && head.y === food.y){
        food = spawnFood();
    } else {
        snake.pop();
    }

    snake.unshift(head);

    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    drawSnake();
}

setInterval(drawGame, 150);

/* ---------------- WORDLE ---------------- */
const answer = "CODE";

function checkWord(){
    let g = document.getElementById("guess").value.toUpperCase();

    document.getElementById("wordleResult").innerText =
        (g === answer) ? "Correct!" : "Try again!";
}

/* ---------------- RPS ---------------- */
function play(user){
    const choices = ["rock","paper","scissors"];
    const bot = choices[Math.floor(Math.random()*3)];

    let result;

    if(user === bot){
        result = "Draw!";
    } else if(
        (user==="rock" && bot==="scissors") ||
        (user==="paper" && bot==="rock") ||
        (user==="scissors" && bot==="paper")
    ){
        result = "You win!";
    } else {
        result = "You lose!";
    }

    document.getElementById("rpsResult").innerText =
        `Bot chose ${bot}. ${result}`;
}
</script>

</body>
