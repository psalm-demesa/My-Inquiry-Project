<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="The Support Space Logo.png" type="image/x-icon" alt="Website Logo generated by ChatGPT">
    <script src="script.js"></script>
    <title>The Support Space</title>
</head>
<body>
   <header>
        <nav class="navbar">
            <div class="logo">♡</div>
              <button class="menu-btn" onclick="toggleMenu()">
        ☰
    </button>
            <ul id="nav-links" class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="resources.html">Resources & Support</a></li>
            </ul>
        </nav>
    </header>

<!-- Main Header -->
        <header class="main-header">
        <section class="welcome-section">
            <h1>Resources & Support</h1>
            <p> We're here to help you find the support you need.</p>
        </section>
         <div>
        <svg
          class="waves"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
          viewBox="0 24 150 28"
          preserveAspectRatio="none"
          shape-rendering="auto"
        >
          <defs>
            <path
              id="gentle-wave"
              d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z"
            />
          </defs>
          <g class="parallax">
            <use
              xlink:href="#gentle-wave"
              x="48"
              y="0"
              fill="rgba(255,255,255,0.7)"
            />
            <use
              xlink:href="#gentle-wave"
              x="48"
              y="3"
              fill="rgba(255,255,255,0.5)"
            />
            <use
              xlink:href="#gentle-wave"
              x="48"
              y="5"
              fill="rgba(255,255,255,0.3)"
            />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="#fff" />
          </g>
        </svg>
      </div>
     </header>

<!-- Resources Content -->
<div class="resources-content">
  <div class="school-counsellors">
    <h1>🗣️ Talk to a Counsellor</h1>
    <button class="talk-button" onclick="openPopup('contact-popup')">Contact Us</button>

          <!--School Contacts-->
      <div id="contact-popup" class="pop-up">
        <div class="pop-up-content">

          <span class="close"
            onclick="closePopup('contact-popup')">&times;</span>

            <h2>Contact a Counsellor</h2>

            <form id="contactForm">
                <input type="text" id="name" placeholder="Your Name" required>

                <input type="email" id="email" placeholder="Your Email" required>

              <select id="counsellor" required>
                  <option value="">Choose a Counsellor</option>
                  <option value="demesap@wsc.school.nz">Psalm de Mesa</option>
                  <option value="poupoures@wsc.school.nz">Sue Poupouare</option>
                  <option value="johnsonk@wsc.school.nz">Kat Johnson</option>
                  <option value="munrol@wsc.school.nz">Leisa Munro</option>
                  <option value="quedleyr@wsc.school.nz">Rochelle Quedley</option>
                </select>

                <textarea
                    id="message"
                    placeholder="How can we help?"
                    rows="5"
                    required></textarea>

                <button type="submit" mail>Send Message</button>
            </form>
        </div>

      </div>
      

  </div>

  <div class="support-groups">
    <h1>🗣️ Support Groups</h1>
    <button class="talk-button" onclick="openPopup('support-groups')">Find a Group</button>
  </div>

  <div class="crisis-helplines">
    <h1>📞 Crisis Helplines</h1>
    <button class="talk-button" onclick="window.location.href='resources.html#crisis-helplines'">Call Now</button>
  </div>
</div>


</body>
</html>
